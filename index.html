<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f8fafc">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230ea5e9' width='100' height='100' rx='20'/><text x='50' y='68' text-anchor='middle' font-size='50' fill='white'>BP</text></svg>">
<title>BP Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  button, input { touch-action: manipulation; }

  :root {
    --slate-50: #f8fafc;
    --slate-100: #f1f5f9;
    --slate-200: #e2e8f0;
    --slate-300: #cbd5e1;
    --slate-400: #94a3b8;
    --slate-500: #64748b;
    --slate-600: #475569;
    --slate-700: #334155;
    --slate-800: #1e293b;
    --sky-50: #f0f9ff;
    --sky-100: #e0f2fe;
    --sky-200: #bae6fd;
    --sky-400: #38bdf8;
    --sky-500: #0ea5e9;
    --sky-600: #0284c7;
    --sky-700: #0369a1;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --green-border: #bbf7d0;
    --yellow: #ca8a04;
    --yellow-bg: #fefce8;
    --yellow-border: #fef08a;
    --red: #dc2626;
    --red-bg: #fef2f2;
    --red-border: #fecaca;
    --radius: 14px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.08);
  }

  html { font-size: 16px; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--slate-50);
    color: var(--slate-700);
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    padding-top: env(safe-area-inset-top);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }

  /* ── noise texture overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }

  .app {
    max-width: 520px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  /* ── header ── */
  header {
    text-align: center;
    padding: 32px 0 28px;
    animation: fadeDown 0.6s ease-out;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  header .icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--sky-400), var(--sky-600));
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    box-shadow: 0 4px 16px rgba(14, 165, 233, 0.25);
  }

  header .icon svg {
    width: 26px;
    height: 26px;
    fill: none;
    stroke: white;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  header h1 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 1.75rem;
    color: var(--slate-800);
    letter-spacing: -0.01em;
  }

  header .date {
    font-size: 0.82rem;
    color: var(--slate-400);
    margin-top: 6px;
    font-weight: 400;
  }

  /* ── card ── */
  .card {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    border: 1px solid var(--slate-100);
    padding: 28px 24px;
    margin-bottom: 24px;
    animation: fadeUp 0.5s ease-out both;
  }

  .card:nth-child(2) { animation-delay: 0.08s; }
  .card:nth-child(3) { animation-delay: 0.14s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── input section ── */
  .input-row {
    display: flex;
    gap: 14px;
    margin-bottom: 20px;
  }

  .field {
    flex: 1;
    position: relative;
  }

  .field label {
    display: block;
    font-size: 0.72rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--slate-400);
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    height: 56px;
    border: 1.5px solid var(--slate-200);
    border-radius: 10px;
    padding: 0 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--slate-800);
    text-align: center;
    background: var(--slate-50);
    transition: all 0.2s ease;
    outline: none;
    -moz-appearance: textfield;
  }

  .field input::-webkit-outer-spin-button,
  .field input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  .field input::placeholder {
    color: var(--slate-300);
    font-weight: 400;
    font-size: 1.1rem;
  }

  .field input:focus {
    border-color: var(--sky-400);
    background: white;
    box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
  }

  .slash {
    display: flex;
    align-items: flex-end;
    padding-bottom: 10px;
    font-size: 1.6rem;
    font-weight: 300;
    color: var(--slate-300);
    user-select: none;
  }

  .save-btn {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--sky-500), var(--sky-600));
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 2px 8px rgba(14, 165, 233, 0.25);
  }

  @media (hover: hover) {
    .save-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(14, 165, 233, 0.35);
    }
  }

  .save-btn:active {
    transform: scale(0.97);
    opacity: 0.85;
  }


  /* ── toast ── */
  .toast {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--slate-800);
    color: white;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    z-index: 100;
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── records section ── */
  .records-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .records-header h2 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 1.2rem;
    color: var(--slate-800);
  }

  .records-header .count {
    font-size: 0.75rem;
    color: var(--slate-400);
    background: var(--slate-100);
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--slate-400);
    font-size: 0.88rem;
    line-height: 1.6;
  }

  .empty-state .empty-icon {
    font-size: 2rem;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  /* ── record rows ── */
  .record {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border-radius: 10px;
    margin-bottom: 6px;
    transition: background 0.15s ease;
    animation: fadeIn 0.3s ease-out both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .record:hover {
    background: var(--slate-50);
  }

  .record .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 14px;
    flex-shrink: 0;
  }

  .record .dot.green { background: var(--green); box-shadow: 0 0 6px rgba(22,163,74,0.3); }
  .record .dot.yellow { background: var(--yellow); box-shadow: 0 0 6px rgba(202,138,4,0.3); }
  .record .dot.red { background: var(--red); box-shadow: 0 0 6px rgba(220,38,38,0.3); }

  .record .rec-date {
    flex: 1;
    font-size: 0.85rem;
    color: var(--slate-500);
    font-weight: 400;
  }

  .record .rec-values {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--slate-800);
    letter-spacing: -0.01em;
  }

  .record .rec-values span {
    font-weight: 400;
    color: var(--slate-400);
    margin: 0 3px;
  }

  .record .delete-btn {
    margin-left: 12px;
    width: 32px;
    height: 32px;
    min-width: 32px;
    border: none;
    background: transparent;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: all 0.15s ease;
    color: var(--slate-400);
  }

  .record:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { background: var(--red-bg); color: var(--red); }

  @media (hover: none) and (pointer: coarse) {
    .record .delete-btn { opacity: 0.5; }
    .record .delete-btn:active { opacity: 1; background: var(--red-bg); color: var(--red); }
  }

  /* ── action buttons ── */
  .action-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }

  .export-btn {
    flex: 1;
    height: 44px;
    border: 1.5px solid var(--slate-200);
    border-radius: 10px;
    background: var(--slate-50);
    color: var(--slate-600);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  @media (hover: hover) {
    .export-btn:hover {
      background: var(--slate-100);
      border-color: var(--slate-300);
    }
    .clear-btn:hover {
      background: var(--red-border);
      border-color: var(--red);
    }
  }

  .export-btn:active {
    transform: scale(0.96);
    opacity: 0.8;
  }

  .clear-btn {
    border-color: var(--red-border);
    color: var(--red);
    background: var(--red-bg);
  }

  .clear-btn:active {
    transform: scale(0.96);
    opacity: 0.8;
  }

  /* ── legend ── */
  .legend {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--slate-100);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.7rem;
    color: var(--slate-400);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 500;
  }

  .legend-item .ldot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .legend-item .ldot.green { background: var(--green); }
  .legend-item .ldot.yellow { background: var(--yellow); }
  .legend-item .ldot.red { background: var(--red); }

  /* ── responsive / iPhone 16 (393px wide) ── */
  @media (max-width: 480px) {
    .app { padding: 16px 16px calc(80px + env(safe-area-inset-bottom)); }
    .card { padding: 22px 18px; }
    .field input { height: 52px; font-size: 1.35rem; }
    header h1 { font-size: 1.5rem; }
    .save-btn { height: 50px; font-size: 0.95rem; }
    .record { padding: 14px 12px; }
    .record .rec-date { font-size: 0.78rem; }
    .record .rec-values { font-size: 1rem; }
  }

  /* iPhone 16 Pro Max & larger phones */
  @media (max-width: 430px) and (min-height: 800px) {
    header { padding: 28px 0 24px; }
    .field input { height: 54px; font-size: 1.4rem; }
    .save-btn { height: 52px; }
  }

  /* standalone PWA mode */
  @media (display-mode: standalone) {
    header { padding-top: 12px; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    </div>
    <h1>Blood Pressure</h1>
    <div class="date" id="todayDate"></div>
  </header>

  <div class="card">
    <div class="input-row">
      <div class="field">
        <label>Systolic</label>
        <input type="number" id="sysInput" placeholder="120" inputmode="numeric" autocomplete="off">
      </div>
      <div class="slash">/</div>
      <div class="field">
        <label>Diastolic</label>
        <input type="number" id="diaInput" placeholder="80" inputmode="numeric" autocomplete="off">
      </div>
    </div>
    <button class="save-btn" id="saveBtn" type="button">Save Reading</button>
  </div>

  <div class="card" id="recordsCard" style="display:none;">
    <div class="records-header">
      <h2>History</h2>
      <div class="count" id="recordCount"></div>
    </div>
    <div id="recordsList"></div>
    <div class="action-row">
      <button class="export-btn" id="exportBtn">Copy All</button>
      <button class="export-btn clear-btn" id="clearBtn">Clear All</button>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="ldot green"></div>Normal</div>
      <div class="legend-item"><div class="ldot yellow"></div>Elevated</div>
      <div class="legend-item"><div class="ldot red"></div>High</div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Reading saved</div>

<script>
  const STORAGE_KEY = 'bp_records';
  const sysInput = document.getElementById('sysInput');
  const diaInput = document.getElementById('diaInput');
  const saveBtn = document.getElementById('saveBtn');
  const recordsList = document.getElementById('recordsList');
  const recordsCard = document.getElementById('recordsCard');
  const recordCount = document.getElementById('recordCount');
  const toast = document.getElementById('toast');
  const todayDate = document.getElementById('todayDate');

  // Show today's date
  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  }

  function getTodayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  todayDate.textContent = formatDate(getTodayStr());


  // Get status color
  function getStatus(sys, dia) {
    if (sys >= 140 || dia >= 90) return 'red';
    if (sys >= 120 || dia >= 80) return 'yellow';
    return 'green';
  }

  // Load records
  function getRecords() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch { return []; }
  }

  function saveRecords(records) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  }

  // Show toast
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // Render
  function render() {
    const records = getRecords();
    if (records.length === 0) {
      recordsCard.style.display = 'none';
      return;
    }

    recordsCard.style.display = 'block';
    recordCount.textContent = records.length + (records.length === 1 ? ' reading' : ' readings');

    recordsList.innerHTML = records.map((r, i) => {
      const status = getStatus(r.sys, r.dia);
      return `<div class="record" style="animation-delay:${i * 0.03}s">
        <div class="dot ${status}"></div>
        <div class="rec-date">${formatDate(r.date)}${r.time ? ' ' + r.time : ''}</div>
        <div class="rec-values">${r.sys}<span>/</span>${r.dia}</div>
        <button class="delete-btn" onclick="deleteRecord(${i})" title="Delete">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
    }).join('');
  }

  // Save
  function handleSave() {
    const sys = parseInt(sysInput.value, 10);
    const dia = parseInt(diaInput.value, 10);
    if (isNaN(sys) || isNaN(dia) || sys < 60 || sys > 260 || dia < 30 || dia > 160) {
      showToast('Enter valid values');
      return;
    }

    const records = getRecords();
    const now = new Date();
    const time = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    records.unshift({ date: getTodayStr(), time, sys, dia });
    saveRecords(records);
    render();

    sysInput.value = '';
    diaInput.value = '';
    showToast('Reading saved');
  }

  saveBtn.addEventListener('click', handleSave);
  saveBtn.addEventListener('touchend', function(e) {
    e.preventDefault();
    handleSave();
  });

  // Delete
  function deleteRecord(index) {
    const records = getRecords();
    records.splice(index, 1);
    saveRecords(records);
    render();
    showToast('Reading deleted');
  }

  // Enter key saves
  function handleKey(e) {
    if (e.key === 'Enter' && !saveBtn.disabled) saveBtn.click();
  }
  sysInput.addEventListener('keydown', handleKey);
  diaInput.addEventListener('keydown', handleKey);

  // Export
  document.getElementById('exportBtn').addEventListener('click', () => {
    const records = getRecords();
    if (records.length === 0) { showToast('No records to copy'); return; }
    const text = records.map(r => formatDate(r.date) + (r.time ? ' ' + r.time : '') + ' | ' + r.sys + '/' + r.dia).join('\n');
    navigator.clipboard.writeText(text).then(() => {
      showToast('Copied to clipboard');
    }).catch(() => {
      // fallback for iOS
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Copied to clipboard');
    });
  });

  // Clear all
  document.getElementById('clearBtn').addEventListener('click', () => {
    if (getRecords().length === 0) { showToast('No records'); return; }
    if (confirm('Delete all records?')) {
      localStorage.removeItem(STORAGE_KEY);
      render();
      showToast('All records cleared');
    }
  });

  // Init
  render();
  sysInput.focus();
</script>

</body>
</html>
