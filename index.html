<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#fdf2f8">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>BP Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  button, input { touch-action: manipulation; }

  :root {
    --pink-50: #fdf2f8;
    --pink-100: #fce7f3;
    --pink-200: #fbcfe8;
    --pink-300: #f9a8d4;
    --pink-400: #f472b6;
    --pink-500: #ec4899;
    --pink-600: #db2777;
    --pink-700: #be185d;
    --rose-50: #fff1f2;
    --rose-100: #ffe4e6;
    --warm-50: #fefce8;
    --warm-100: #fef3c7;
    --gray-50: #fafafa;
    --gray-100: #f5f5f5;
    --gray-200: #e5e5e5;
    --gray-300: #d4d4d4;
    --gray-400: #a3a3a3;
    --gray-500: #737373;
    --gray-600: #525252;
    --gray-700: #404040;
    --gray-800: #262626;
    --green: #059669;
    --green-bg: #ecfdf5;
    --yellow: #d97706;
    --yellow-bg: #fffbeb;
    --red: #e11d48;
    --red-bg: #fff1f2;
    --red-border: #fecdd3;
    --radius: 16px;
  }

  html { font-size: 16px; }

  body {
    font-family: 'Outfit', sans-serif;
    background: linear-gradient(160deg, var(--pink-50) 0%, #fff5f7 40%, #fef1f6 100%);
    color: var(--gray-700);
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    padding-top: env(safe-area-inset-top);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-tap-highlight-color: transparent;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    right: -30%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(244,114,182,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    left: -20%;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(236,72,153,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    max-width: 520px;
    margin: 0 auto;
    padding: 24px 16px 80px;
    position: relative;
    z-index: 1;
  }

  /* ── header ── */
  header {
    text-align: center;
    padding: 32px 0 28px;
    animation: fadeDown 0.6s ease-out;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  header .icon {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, var(--pink-400), var(--pink-600));
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    box-shadow: 0 4px 20px rgba(236, 72, 153, 0.3);
  }

  header .icon svg {
    width: 26px;
    height: 26px;
    fill: none;
    stroke: white;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 500;
    font-size: 1.8rem;
    color: var(--gray-800);
    letter-spacing: -0.01em;
  }

  header .date {
    font-size: 0.82rem;
    color: var(--gray-400);
    margin-top: 6px;
    font-weight: 400;
  }

  /* ── card ── */
  .card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: var(--radius);
    box-shadow: 0 4px 24px rgba(236, 72, 153, 0.06), 0 1px 3px rgba(0,0,0,0.04);
    border: 1px solid rgba(251, 207, 232, 0.4);
    padding: 28px 24px;
    margin-bottom: 20px;
    animation: fadeUp 0.5s ease-out both;
  }

  .card:nth-child(2) { animation-delay: 0.08s; }
  .card:nth-child(3) { animation-delay: 0.14s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── input section ── */
  .input-row {
    display: flex;
    gap: 14px;
    margin-bottom: 20px;
  }

  .field {
    flex: 1;
    position: relative;
  }

  .field label {
    display: block;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--pink-400);
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    height: 56px;
    border: 1.5px solid var(--pink-200);
    border-radius: 12px;
    padding: 0 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--gray-800);
    text-align: center;
    background: rgba(253, 242, 248, 0.5);
    transition: all 0.2s ease;
    outline: none;
    -moz-appearance: textfield;
  }

  .field input::-webkit-outer-spin-button,
  .field input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  .field input::placeholder {
    color: var(--pink-300);
    font-weight: 400;
    font-size: 1.1rem;
  }

  .field input:focus {
    border-color: var(--pink-400);
    background: white;
    box-shadow: 0 0 0 3px rgba(244, 114, 182, 0.15);
  }

  .slash {
    display: flex;
    align-items: flex-end;
    padding-bottom: 10px;
    font-size: 1.6rem;
    font-weight: 300;
    color: var(--pink-300);
    user-select: none;
  }

  /* ── pill checkbox ── */
  .pill-check {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }

  .pill-check input { display: none; }

  .pill-box {
    width: 22px;
    height: 22px;
    border: 1.5px solid var(--pink-300);
    border-radius: 6px;
    background: rgba(253, 242, 248, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }

  .pill-box::after {
    content: '';
    width: 12px;
    height: 12px;
    border-radius: 3px;
    background: var(--pink-500);
    transform: scale(0);
    transition: transform 0.15s ease;
  }

  .pill-check input:checked + .pill-box {
    border-color: var(--pink-500);
    background: var(--pink-100);
  }

  .pill-check input:checked + .pill-box::after {
    transform: scale(1);
  }

  .pill-label {
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--gray-600);
  }

  .pill-tag {
    font-size: 0.6rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 8px;
    flex-shrink: 0;
  }

  .pill-tag.yes {
    background: var(--pink-100);
    color: var(--pink-600);
  }

  .pill-tag.no {
    background: var(--gray-100);
    color: var(--gray-400);
  }

  .save-btn {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--pink-500), var(--pink-600));
    color: white;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 14px rgba(236, 72, 153, 0.3);
  }

  .save-btn:active {
    transform: scale(0.97);
    opacity: 0.85;
  }

  /* ── toggle past button ── */
  .toggle-past-btn {
    width: 100%;
    height: 40px;
    border: none;
    background: transparent;
    color: var(--pink-500);
    font-family: 'Outfit', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    margin-top: 12px;
    border-radius: 8px;
    transition: all 0.2s ease;
  }

  .toggle-past-btn:active { opacity: 0.7; }

  .past-form {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--pink-100);
  }

  .past-form input[type="date"],
  .past-form input[type="time"] {
    width: 100%;
    height: 52px;
    border: 1.5px solid var(--pink-200);
    border-radius: 12px;
    padding: 0 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--gray-800);
    background: rgba(253, 242, 248, 0.5);
    outline: none;
    transition: all 0.2s ease;
    -webkit-appearance: none;
  }

  .past-form input[type="date"]:focus,
  .past-form input[type="time"]:focus {
    border-color: var(--pink-400);
    background: white;
    box-shadow: 0 0 0 3px rgba(244, 114, 182, 0.15);
  }

  .past-save-btn {
    background: linear-gradient(135deg, var(--pink-600), var(--pink-700)) !important;
    margin-top: 6px;
  }

  /* ── toast ── */
  .toast {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--gray-800);
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 500;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    z-index: 100;
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── records section ── */
  .records-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .records-header h2 {
    font-family: 'Playfair Display', serif;
    font-weight: 500;
    font-size: 1.2rem;
    color: var(--gray-800);
  }

  .records-header .count {
    font-size: 0.72rem;
    color: var(--pink-500);
    background: var(--pink-100);
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 600;
  }

  /* ── record rows ── */
  .record {
    display: flex;
    align-items: center;
    padding: 14px 14px;
    border-radius: 12px;
    margin-bottom: 4px;
    transition: background 0.15s ease;
    animation: fadeIn 0.3s ease-out both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .record:active {
    background: var(--pink-50);
  }

  .record .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    margin-right: 14px;
    flex-shrink: 0;
  }

  .record .dot.green { background: var(--green); box-shadow: 0 0 8px rgba(5,150,105,0.3); }
  .record .dot.yellow { background: var(--yellow); box-shadow: 0 0 8px rgba(217,119,6,0.3); }
  .record .dot.red { background: var(--red); box-shadow: 0 0 8px rgba(225,29,72,0.3); }

  .record .rec-date {
    flex: 1;
    font-size: 0.82rem;
    color: var(--gray-500);
    font-weight: 400;
  }

  .record .rec-values {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--gray-800);
    letter-spacing: -0.01em;
  }

  .record .rec-values span {
    font-weight: 400;
    color: var(--pink-300);
    margin: 0 2px;
  }

  .record .delete-btn {
    margin-left: 10px;
    width: 32px;
    height: 32px;
    min-width: 32px;
    border: none;
    background: transparent;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.4;
    transition: all 0.15s ease;
    color: var(--gray-400);
  }

  .delete-btn:active { opacity: 1; background: var(--red-bg); color: var(--red); }

  /* ── action buttons ── */
  .action-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .action-btn {
    flex: 1;
    height: 44px;
    border: 1.5px solid var(--pink-200);
    border-radius: 12px;
    background: rgba(253, 242, 248, 0.5);
    color: var(--pink-600);
    font-family: 'Outfit', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .action-btn:active {
    transform: scale(0.96);
    opacity: 0.8;
  }

  .clear-btn {
    border-color: var(--red-border);
    color: var(--red);
    background: var(--red-bg);
  }

  /* ── backup card ── */
  .backup-card .records-header { margin-bottom: 12px; }

  .restore-label {
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: var(--green-bg) !important;
    border-color: #a7f3d0 !important;
    color: var(--green) !important;
  }

  .restore-label:active {
    transform: scale(0.96);
    opacity: 0.8;
  }

  /* ── legend ── */
  .legend {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--pink-100);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.68rem;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 600;
  }

  .legend-item .ldot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .legend-item .ldot.green { background: var(--green); }
  .legend-item .ldot.yellow { background: var(--yellow); }
  .legend-item .ldot.red { background: var(--red); }

  /* ── responsive / iPhone 16 ── */
  @media (max-width: 480px) {
    .app { padding: 16px 16px calc(80px + env(safe-area-inset-bottom)); }
    .card { padding: 22px 18px; }
    .field input { height: 52px; font-size: 1.35rem; }
    header h1 { font-size: 1.55rem; }
    .save-btn { height: 50px; font-size: 0.95rem; }
    .record { padding: 12px 10px; }
    .record .rec-date { font-size: 0.75rem; }
    .record .rec-values { font-size: 0.95rem; }
  }

  @media (max-width: 430px) and (min-height: 800px) {
    header { padding: 28px 0 24px; }
    .field input { height: 54px; font-size: 1.4rem; }
    .save-btn { height: 52px; }
  }

  @media (display-mode: standalone) {
    header { padding-top: 12px; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    </div>
    <h1>Blood Pressure</h1>
    <div class="date" id="todayDate"></div>
  </header>

  <div class="card">
    <div class="input-row">
      <div class="field">
        <label>Systolic</label>
        <input type="number" id="sysInput" placeholder="120" inputmode="numeric" autocomplete="off">
      </div>
      <div class="slash">/</div>
      <div class="field">
        <label>Diastolic</label>
        <input type="number" id="diaInput" placeholder="80" inputmode="numeric" autocomplete="off">
      </div>
    </div>
    <label class="pill-check">
      <input type="checkbox" id="pillCheck">
      <span class="pill-box"></span>
      <span class="pill-label">After pill</span>
    </label>
    <button class="save-btn" id="saveBtn" type="button">Save Reading</button>
    <button class="toggle-past-btn" id="togglePastBtn" type="button">+ Add Past Record</button>
    <div class="past-form" id="pastForm" style="display:none;">
      <div class="input-row">
        <div class="field">
          <label>Date</label>
          <input type="date" id="pastDate" autocomplete="off">
        </div>
        <div class="field">
          <label>Time (24H)</label>
          <input type="time" id="pastTime" autocomplete="off">
        </div>
      </div>
      <div class="input-row">
        <div class="field">
          <label>Systolic</label>
          <input type="number" id="pastSys" placeholder="120" inputmode="numeric" autocomplete="off">
        </div>
        <div class="slash">/</div>
        <div class="field">
          <label>Diastolic</label>
          <input type="number" id="pastDia" placeholder="80" inputmode="numeric" autocomplete="off">
        </div>
      </div>
      <label class="pill-check">
        <input type="checkbox" id="pastPillCheck">
        <span class="pill-box"></span>
        <span class="pill-label">After pill</span>
      </label>
      <button class="save-btn past-save-btn" id="savePastBtn" type="button">Save Past Record</button>
    </div>
  </div>

  <div class="card" id="recordsCard" style="display:none;">
    <div class="records-header">
      <h2>History</h2>
      <div class="count" id="recordCount"></div>
    </div>
    <div id="recordsList"></div>
    <div class="action-row">
      <button class="action-btn" id="exportBtn" type="button">Copy All</button>
      <button class="action-btn clear-btn" id="clearBtn" type="button">Clear All</button>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="ldot green"></div>Normal</div>
      <div class="legend-item"><div class="ldot yellow"></div>Elevated</div>
      <div class="legend-item"><div class="ldot red"></div>High</div>
    </div>
  </div>

  <div class="card backup-card">
    <div class="records-header">
      <h2>Backup</h2>
    </div>
    <div class="action-row">
      <button class="action-btn" id="backupBtn" type="button">Download Backup</button>
      <label class="action-btn restore-label" id="restoreLabel">
        Load Backup
        <input type="file" id="restoreFile" accept=".json" style="display:none">
      </label>
    </div>
  </div>
</div>

<div class="toast" id="toast">Reading saved</div>

<script>
  const STORAGE_KEY = 'bp_records';
  const sysInput = document.getElementById('sysInput');
  const diaInput = document.getElementById('diaInput');
  const saveBtn = document.getElementById('saveBtn');
  const recordsList = document.getElementById('recordsList');
  const recordsCard = document.getElementById('recordsCard');
  const recordCount = document.getElementById('recordCount');
  const toast = document.getElementById('toast');
  const todayDate = document.getElementById('todayDate');

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  }

  function getTodayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  todayDate.textContent = formatDate(getTodayStr());

  function getStatus(sys, dia) {
    if (sys >= 140 || dia >= 90) return 'red';
    if (sys >= 120 || dia >= 80) return 'yellow';
    return 'green';
  }

  function getRecords() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function saveRecords(records) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function render() {
    const records = getRecords();
    if (records.length === 0) {
      recordsCard.style.display = 'none';
      return;
    }
    recordsCard.style.display = 'block';
    recordCount.textContent = records.length + (records.length === 1 ? ' reading' : ' readings');
    recordsList.innerHTML = records.map((r, i) => {
      const status = getStatus(r.sys, r.dia);
      return `<div class="record" style="animation-delay:${i * 0.03}s">
        <div class="dot ${status}"></div>
        <div class="rec-date">${formatDate(r.date)}${r.time ? ' ' + r.time : ''}</div>
        <div class="rec-values">${r.sys}<span>/</span>${r.dia}</div>
        <span class="pill-tag ${r.pill ? 'yes' : 'no'}">${r.pill ? 'pill' : 'no pill'}</span>
        <button class="delete-btn" onclick="deleteRecord(${i})" type="button" title="Delete">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
    }).join('');
  }

  // Save
  function handleSave() {
    const sys = parseInt(sysInput.value, 10);
    const dia = parseInt(diaInput.value, 10);
    if (isNaN(sys) || isNaN(dia) || sys < 60 || sys > 260 || dia < 30 || dia > 160) {
      showToast('Enter valid values');
      return;
    }
    const records = getRecords();
    const now = new Date();
    const time = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    const pill = document.getElementById('pillCheck').checked;
    records.unshift({ date: getTodayStr(), time, sys, dia, pill });
    saveRecords(records);
    render();
    sysInput.value = '';
    diaInput.value = '';
    document.getElementById('pillCheck').checked = false;
    showToast('Reading saved');
  }

  saveBtn.addEventListener('click', handleSave);
  saveBtn.addEventListener('touchend', function(e) { e.preventDefault(); handleSave(); });

  // Delete
  function deleteRecord(index) {
    const records = getRecords();
    records.splice(index, 1);
    saveRecords(records);
    render();
    showToast('Reading deleted');
  }

  // Toggle past form
  const togglePastBtn = document.getElementById('togglePastBtn');
  const pastForm = document.getElementById('pastForm');
  const pastDate = document.getElementById('pastDate');
  const pastTime = document.getElementById('pastTime');
  const pastSys = document.getElementById('pastSys');
  const pastDia = document.getElementById('pastDia');

  function handleTogglePast() {
    const open = pastForm.style.display === 'none';
    pastForm.style.display = open ? 'block' : 'none';
    togglePastBtn.textContent = open ? '- Cancel' : '+ Add Past Record';
    if (open) pastDate.value = getTodayStr();
  }

  togglePastBtn.addEventListener('click', handleTogglePast);
  togglePastBtn.addEventListener('touchend', function(e) { e.preventDefault(); handleTogglePast(); });

  // Save past record
  function handleSavePast() {
    const sys = parseInt(pastSys.value, 10);
    const dia = parseInt(pastDia.value, 10);
    const date = pastDate.value;
    const time = pastTime.value;
    if (!date || !time || isNaN(sys) || isNaN(dia)) {
      showToast('Fill all fields');
      return;
    }
    const records = getRecords();
    const pill = document.getElementById('pastPillCheck').checked;
    records.push({ date, time, sys, dia, pill });
    records.sort((a, b) => {
      const da = a.date + (a.time || '00:00');
      const db = b.date + (b.time || '00:00');
      return db.localeCompare(da);
    });
    saveRecords(records);
    render();
    pastSys.value = '';
    pastDia.value = '';
    pastTime.value = '';
    document.getElementById('pastPillCheck').checked = false;
    pastForm.style.display = 'none';
    togglePastBtn.textContent = '+ Add Past Record';
    showToast('Past record saved');
  }

  document.getElementById('savePastBtn').addEventListener('click', handleSavePast);
  document.getElementById('savePastBtn').addEventListener('touchend', function(e) { e.preventDefault(); handleSavePast(); });

  // Export
  function handleExport() {
    const records = getRecords();
    if (records.length === 0) { showToast('No records to copy'); return; }
    const text = records.map(r => formatDate(r.date) + (r.time ? ' ' + r.time : '') + ' | ' + r.sys + '/' + r.dia + (r.pill ? ' | after pill' : ' | no pill')).join('\n');
    navigator.clipboard.writeText(text).then(() => {
      showToast('Copied to clipboard');
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Copied to clipboard');
    });
  }

  document.getElementById('exportBtn').addEventListener('click', handleExport);
  document.getElementById('exportBtn').addEventListener('touchend', function(e) { e.preventDefault(); handleExport(); });

  // Clear all
  function handleClear() {
    if (getRecords().length === 0) { showToast('No records'); return; }
    if (confirm('Delete all records?')) {
      localStorage.removeItem(STORAGE_KEY);
      render();
      showToast('All records cleared');
    }
  }

  document.getElementById('clearBtn').addEventListener('click', handleClear);
  document.getElementById('clearBtn').addEventListener('touchend', function(e) { e.preventDefault(); handleClear(); });

  // Enter key saves
  function handleKey(e) { if (e.key === 'Enter') saveBtn.click(); }
  sysInput.addEventListener('keydown', handleKey);
  diaInput.addEventListener('keydown', handleKey);

  // Backup - download JSON file
  function handleBackup() {
    const records = getRecords();
    if (records.length === 0) { showToast('No records to backup'); return; }
    const blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'bp-backup-' + getTodayStr() + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Backup downloaded');
  }

  document.getElementById('backupBtn').addEventListener('click', handleBackup);
  document.getElementById('backupBtn').addEventListener('touchend', function(e) { e.preventDefault(); handleBackup(); });

  // Restore - load JSON file
  document.getElementById('restoreFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) { showToast('Invalid backup file'); return; }
        const existing = getRecords();
        if (existing.length > 0 && !confirm('This will replace your current ' + existing.length + ' records. Continue?')) return;
        saveRecords(data);
        render();
        showToast(data.length + ' records restored');
      } catch {
        showToast('Invalid backup file');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  render();

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>

</body>
</html>
